<svg viewBox="0 0 680 540" width="100%" role="img" aria-label="Sheaf three-layer architecture diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- title -->
  <text class="th" x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#3C3489">Sheaf Three-Layer Architecture</text>

  <!-- Layer 1: ingestion -->
  <rect x="40" y="55" width="600" height="90" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="55" y="76" font-size="14" font-weight="500" fill="#534AB7">Layer 1: Ingestion</text>

  <rect x="65" y="93" width="215" height="38" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="172" y="112" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Paste any URL</text>

  <rect x="310" y="93" width="135" height="38" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="377" y="112" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="400" fill="#5F5E5A">Browser Ext (P1)</text>

  <rect x="470" y="93" width="150" height="38" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="545" y="112" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="400" fill="#5F5E5A">CLI &amp; MCP (now)</text>

  <line x1="340" y1="148" x2="340" y2="175" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Layer 2: processing -->
  <rect x="40" y="178" width="600" height="172" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="th" x="55" y="199" font-size="14" font-weight="500" fill="#0F6E56">Layer 2: Processing — fully automatic</text>

  <rect x="55" y="215" width="160" height="38" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="t" x="135" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">1. Article Fetch</text>
  <text class="ts" x="135" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="400" fill="#0F6E56">requests &rarr; playwright &rarr; fallback</text>

  <line x1="220" y1="234" x2="255" y2="234" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="260" y="215" width="160" height="38" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="t" x="340" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">2. LLM Understand</text>
  <text class="ts" x="340" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="400" fill="#0F6E56">classify + summarize + tag</text>

  <line x1="425" y1="234" x2="460" y2="234" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="465" y="215" width="155" height="38" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="t" x="542" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">3. Local Store</text>
  <text class="ts" x="542" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="400" fill="#0F6E56">markdown + json + index</text>

  <rect x="55" y="270" width="175" height="65" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text class="ts" x="142" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">OpenAI-compatible LLM</text>
  <text class="ts" x="142" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">Any provider / self-hosted</text>
  <text class="ts" x="142" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">Negligible monthly cost</text>

  <rect x="260" y="270" width="160" height="65" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text class="ts" x="340" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">Topics: auto-extracted</text>
  <text class="ts" x="340" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">Sub-topics: LLM driven</text>
  <text class="ts" x="340" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">Tags: cross-topic linking</text>

  <rect x="465" y="270" width="155" height="65" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text class="ts" x="542" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">data/entries/ by date</text>
  <text class="ts" x="542" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">data/summaries/ abstracts</text>
  <text class="ts" x="542" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">index.jsonl global index</text>

  <line x1="340" y1="353" x2="340" y2="380" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Layer 3: consumption -->
  <rect x="40" y="383" width="600" height="137" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="55" y="404" font-size="14" font-weight="500" fill="#854F0B">Layer 3: Consumption — Agent is the interface</text>

  <rect x="55" y="420" width="270" height="86" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t" x="190" y="442" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">You: What RAG papers did I save?</text>
  <text class="ts" x="190" y="462" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">Agent: 3 articles in the last 7 days</text>
  <text class="ts" x="190" y="482" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">Want a comparison? Set a reminder?</text>

  <rect x="360" y="420" width="260" height="86" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t" x="490" y="442" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">Roadmap (P1-P2)</text>
  <text class="ts" x="490" y="462" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">Scheduled reports &amp; digests</text>
  <text class="ts" x="490" y="482" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">Knowledge card marketplace</text>

  <rect x="370" y="55" width="250" height="28" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text class="ts" x="495" y="69" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#534AB7">&#9733; Key Differentiator: Agent-Oriented</text>

</svg>

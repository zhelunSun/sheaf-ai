<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Sheaf Extension Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #0f0f0f;
      color: #e0e0e0;
    }
    h1 { font-size: 20px; margin-bottom: 24px; color: #fff; }
    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #3b82f6;
    }
    .help {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
    button {
      margin-top: 16px;
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .saved {
      display: none;
      margin-top: 8px;
      font-size: 13px;
      color: #4ade80;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .status.ok { background: #065f46; color: #6ee7b7; }
    .status.err { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>
  <h1>🌾 Sheaf Extension Settings</h1>

  <div>
    <label for="apiUrl">Sheaf API URL</label>
    <input type="text" id="apiUrl" value="http://localhost:8321" placeholder="http://localhost:8321">
    <div class="help">The URL of your local Sheaf API server. Run <code>sheaf serve</code> to start.</div>
  </div>

  <button id="saveBtn">Save</button>
  <div class="saved" id="savedMsg">✓ Settings saved</div>

  <div class="status" id="connectionStatus" style="display:none;"></div>

  <script>
    const apiUrlInput = document.getElementById('apiUrl');
    const saveBtn = document.getElementById('saveBtn');
    const savedMsg = document.getElementById('savedMsg');
    const connectionStatus = document.getElementById('connectionStatus');

    // Load saved URL
    chrome.storage.local.get(['sheafApiUrl'], (result) => {
      if (result.sheafApiUrl) apiUrlInput.value = result.sheafApiUrl;
    });

    // Save + test connection
    saveBtn.addEventListener('click', async () => {
      const url = apiUrlInput.value.trim().replace(/\/+$/, '');
      await chrome.storage.local.set({ sheafApiUrl: url });

      savedMsg.style.display = 'block';
      setTimeout(() => { savedMsg.style.display = 'none'; }, 2000);

      // Test connection
      try {
        const resp = await fetch(`${url}/health`);
        const data = await resp.json();
        connectionStatus.style.display = 'block';
        connectionStatus.className = 'status ok';
        connectionStatus.textContent = `✓ Connected to Sheaf v${data.version}`;
      } catch {
        connectionStatus.style.display = 'block';
        connectionStatus.className = 'status err';
        connectionStatus.textContent = `✗ Cannot connect to ${url}. Make sure "sheaf serve" is running.`;
      }
    });
  </script>
</body>
</html>

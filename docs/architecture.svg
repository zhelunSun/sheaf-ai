<svg viewBox="0 0 680 540" width="100%" role="img" aria-label="Universal collector three-layer architecture diagram">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- title -->
  <text class="th" x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#3C3489">Sheaf 三层架构</text>

  <!-- Layer 1: ingestion -->
  <rect x="40" y="55" width="600" height="90" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="55" y="76" font-size="14" font-weight="500" fill="#534AB7">Layer 1: 收录层 (ingestion)</text>

  <rect x="65" y="93" width="215" height="38" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text class="t" x="172" y="112" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">你粘贴微信文章链接</text>

  <rect x="310" y="93" width="135" height="38" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="377" y="112" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="400" fill="#5F5E5A">浏览器插件 (P1)</text>

  <rect x="470" y="93" width="150" height="38" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="t" x="545" y="112" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="400" fill="#5F5E5A">微信自动化 (P2)</text>

  <line x1="340" y1="148" x2="340" y2="175" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Layer 2: processing -->
  <rect x="40" y="178" width="600" height="172" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="th" x="55" y="199" font-size="14" font-weight="500" fill="#0F6E56">Layer 2: 加工层 (processing) — 全自动，你只负责丢进来</text>

  <rect x="55" y="215" width="160" height="38" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="t" x="135" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">1. 文章抓取</text>
  <text class="ts" x="135" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="400" fill="#0F6E56">requests → playwright → 你粘贴正文</text>

  <line x1="220" y1="234" x2="255" y2="234" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="260" y="215" width="160" height="38" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="t" x="340" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">2. LLM 理解</text>
  <text class="ts" x="340" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="400" fill="#0F6E56">分类 + 摘要 + 标签</text>

  <line x1="425" y1="234" x2="460" y2="234" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="465" y="215" width="155" height="38" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="t" x="542" y="234" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">3. 本地存储</text>
  <text class="ts" x="542" y="252" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="400" fill="#0F6E56">markdown + json + index</text>

  <rect x="55" y="270" width="175" height="65" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text class="ts" x="142" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">DeepSeek-V3.2</text>
  <text class="ts" x="142" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">SiliconFlow 国内加速</text>
  <text class="ts" x="142" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">~¥0.3/月 成本可忽略</text>

  <rect x="260" y="270" width="160" height="65" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text class="ts" x="340" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">主题: 科研/市场/AI产品/AI技术</text>
  <text class="ts" x="340" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">子主题: LLM 自动提取</text>
  <text class="ts" x="340" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">标签: 跨主题关联</text>

  <rect x="465" y="270" width="155" height="65" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text class="ts" x="542" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">data/entries/ 按日期</text>
  <text class="ts" x="542" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">data/summaries/ 摘要</text>
  <text class="ts" x="542" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#27500A">index.jsonl 全局索引</text>

  <line x1="340" y1="353" x2="340" y2="380" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Layer 3: consumption -->
  <rect x="40" y="383" width="600" height="137" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="55" y="404" font-size="14" font-weight="500" fill="#854F0B">Layer 3: 消费层 (consumption) — Agent 是交互接口</text>

  <rect x="55" y="420" width="270" height="86" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t" x="190" y="442" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">你: 最近我收了哪些关于 RAG 的文章？</text>
  <text class="ts" x="190" y="462" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">Agent: 过去 7 天 3 篇，其中一篇提到了 6.15 deadline</text>
  <text class="ts" x="190" y="482" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">需要生成对比摘要吗？要加提醒吗？</text>

  <rect x="360" y="420" width="260" height="86" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t" x="490" y="442" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">未来扩展 (P1-P2)</text>
  <text class="ts" x="490" y="462" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">定时报告 (WorkBuddy 自动化)</text>
  <text class="ts" x="490" y="482" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#854F0B">Skill 一键转化</text>

  <rect x="370" y="55" width="250" height="28" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text class="ts" x="495" y="69" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#534AB7">★ 核心差异化: Agent-Oriented</text>

</svg>
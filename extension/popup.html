<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380, initial-scale=1.0">
  <title>Sheaf</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .header .version {
      font-size: 11px;
      color: #666;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.ok { background: #4ade80; }
    .status-dot.err { background: #ef4444; }
    .status-dot.loading { background: #fbbf24; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Current Page */
    .current-page {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
    }
    .current-page .label {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .current-page .url {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 340px;
    }
    .current-page .title {
      font-size: 14px;
      color: #fff;
      margin-top: 4px;
      line-height: 1.4;
    }

    /* Collect Button */
    .collect-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 16px 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .collect-btn.ready {
      background: #3b82f6;
      color: white;
    }
    .collect-btn.ready:hover {
      background: #2563eb;
    }
    .collect-btn.collected {
      background: #065f46;
      color: #6ee7b7;
      cursor: default;
    }
    .collect-btn.loading {
      background: #1e3a5f;
      color: #93c5fd;
      cursor: wait;
    }
    .collect-btn.error {
      background: #7f1d1d;
      color: #fca5a5;
    }
    .collect-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 1px;
      background: #2a2a2a;
      margin: 0 20px;
      border-radius: 8px;
      overflow: hidden;
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      background: #181818;
    }
    .stat .value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .stat .label {
      font-size: 10px;
      text-transform: uppercase;
      color: #666;
      margin-top: 2px;
    }

    /* Recent */
    .recent {
      padding: 16px 20px;
    }
    .recent .label {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .recent-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .recent-item .text {
      font-size: 12px;
      color: #aaa;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid #2a2a2a;
    }
    .footer a {
      font-size: 11px;
      color: #666;
      text-decoration: none;
    }
    .footer a:hover { color: #999; }
    .footer .settings-btn {
      font-size: 11px;
      color: #666;
      background: none;
      border: 1px solid #333;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .footer .settings-btn:hover {
      border-color: #555;
      color: #aaa;
    }

    /* Error message */
    .error-msg {
      margin: 8px 20px;
      padding: 8px 12px;
      background: #1a0505;
      border: 1px solid #4a1010;
      border-radius: 6px;
      font-size: 12px;
      color: #fca5a5;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div>
      <h1>🌾 Sheaf</h1>
    </div>
    <div style="display:flex;align-items:center;">
      <span class="status-dot loading" id="statusDot"></span>
      <span class="version" id="statusText">Connecting...</span>
    </div>
  </div>

  <!-- Current Page Info -->
  <div class="current-page">
    <div class="label">Current Page</div>
    <div class="title" id="pageTitle">Loading...</div>
    <div class="url" id="pageUrl"></div>
  </div>

  <!-- Error message -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Collect Button -->
  <button class="collect-btn ready" id="collectBtn" disabled>
    📥 Collect this page
  </button>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="value" id="statEntries">—</div>
      <div class="label">Entries</div>
    </div>
    <div class="stat">
      <div class="value" id="statCards">—</div>
      <div class="label">Cards</div>
    </div>
    <div class="stat">
      <div class="value" id="statTopics">—</div>
      <div class="label">Topics</div>
    </div>
  </div>

  <!-- Recent Entries -->
  <div class="recent">
    <div class="label">Recent</div>
    <div id="recentList">
      <div class="recent-item">
        <div class="dot"></div>
        <div class="text">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://github.com/zhelunSun/sheaf-ai" target="_blank">sheaf-ai</a>
    <button class="settings-btn" id="settingsBtn">⚙ Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

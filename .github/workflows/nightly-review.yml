name: Nightly Merge Review

on:
  workflow_dispatch:
  schedule:
    # 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch nightly branches
        run: git fetch origin "+refs/heads/nightly/*:refs/remotes/origin/nightly/*"

      - name: Select latest nightly branch
        id: nightly
        shell: bash
        run: |
          latest="$(git for-each-ref --sort=-committerdate --format='%(refname:short)' refs/remotes/origin/nightly | head -n 1)"
          if [ -z "$latest" ]; then
            echo "No nightly branch found." >> "$GITHUB_STEP_SUMMARY"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          main_head="$(git rev-parse origin/main)"
          merge_base="$(git merge-base origin/main "$latest")"
          if [ "$main_head" = "$merge_base" ]; then
            ff_only="true"
          else
            ff_only="false"
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "branch=$latest" >> "$GITHUB_OUTPUT"
          echo "head=$(git rev-parse "$latest")" >> "$GITHUB_OUTPUT"
          echo "ff_only=$ff_only" >> "$GITHUB_OUTPUT"

      - name: Create review worktree
        if: steps.nightly.outputs.found == 'true'
        run: git worktree add .nightly-review "${{ steps.nightly.outputs.branch }}"

      - name: Set up Python
        if: steps.nightly.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        if: steps.nightly.outputs.found == 'true'
        working-directory: .nightly-review
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run merge gate
        if: steps.nightly.outputs.found == 'true'
        working-directory: .nightly-review
        run: |
          python -m pytest tests -q --basetemp .pytest-tmp
          python -m ruff check sheaf_ai sheaf_cards tests
          python -m build
          python -m sheaf_ai.cli --help
          python -m sheaf_ai.cli --version
          git diff --check
          tracked="$(git ls-files internal .workbuddy .learnings data dist sheaf_ai.egg-info .env scripts requirements.txt)"
          if [ -n "$tracked" ]; then
            echo "$tracked"
            exit 1
          fi

      - name: Write review summary
        if: steps.nightly.outputs.found == 'true'
        shell: bash
        run: |
          {
            echo "## Nightly Merge Review"
            echo ""
            echo "- Branch: \`${{ steps.nightly.outputs.branch }}\`"
            echo "- Head: \`${{ steps.nightly.outputs.head }}\`"
            echo "- Fast-forward from main: \`${{ steps.nightly.outputs.ff_only }}\`"
            echo "- Result: gate completed; this workflow never merges or publishes."
          } >> "$GITHUB_STEP_SUMMARY"
